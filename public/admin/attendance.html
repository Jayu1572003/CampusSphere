<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance - Admin Portal - CampusSphere</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">CS</div>
        <div>
          <div class="sidebar-title">CampusSphere</div>
          <div class="sidebar-subtitle">Admin Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Menu</div>
          <a href="dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
          <a href="students.html" class="nav-link"><span class="icon">👩‍🎓</span> Students</a>
          <a href="courses.html" class="nav-link"><span class="icon">📚</span> Courses</a>
          <a href="attendance.html" class="nav-link active"><span class="icon">📅</span> Attendance</a>
          <a href="fees.html" class="nav-link"><span class="icon">💳</span> Fees</a>
          <a href="results.html" class="nav-link"><span class="icon">🏆</span> Results</a>
          <a href="notifications.html" class="nav-link"><span class="icon">🔔</span> Notifications</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">A</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Admin</div>
            <div class="user-role" id="sidebar-user-role">Administrator</div>
          </div>
          <button onclick="Auth.logout()" class="btn btn-secondary btn-sm" style="margin-left:auto; padding:5px 8px;">🚪</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div>
          <h1 class="page-title">Attendance Tracking</h1>
          <p class="page-subtitle">Mark and view student attendance records</p>
        </div>
        <div class="top-bar-actions">
          <button class="btn btn-primary" onclick="openModal('attendanceModal')">📝 Mark Attendance</button>
        </div>
      </header>

      <div class="content-area">
        <div class="card">
          <div class="filter-bar">
            <input type="date" id="dateFilter" class="filter-select">
            <select id="courseFilter" class="filter-select">
              <option value="">All Courses</option>
            </select>
            <div class="search-input">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search student...">
            </div>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Student</th>
                  <th>Course</th>
                  <th>Status</th>
                  <th>Remarks</th>
                  <th class="text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="attendance-tbody">
                <tr><td colspan="6" class="text-center loading"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="attendanceModal">
    <div class="modal" style="width: 800px;">
      <div class="modal-header">
        <h3 class="modal-title">Mark Group Attendance</h3>
        <button class="modal-close" onclick="closeModal('attendanceModal')">✕</button>
      </div>
      <div class="modal-body">
        <div class="grid-3 mb-24">
          <div class="form-group">
            <label>Date*</label>
            <input type="date" id="markDate" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Course*</label>
            <select id="markCourse" class="form-control" required></select>
          </div>
          <div class="form-group" style="display:flex; align-items:flex-end;">
            <button class="btn btn-secondary w-100" id="loadStudentsBtn">Load Students</button>
          </div>
        </div>
        
        <div id="attendanceListWrapper" style="display:none; max-height:400px; overflow-y:auto;">
          <table style="margin-bottom: 20px;">
            <thead>
              <tr>
                <th>Student ID</th>
                <th>Name</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="mark-attendance-tbody"></tbody>
          </table>
          <button class="btn btn-primary btn-block" id="saveAttendanceBtn">Save Attendance</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin/attendance.js"></script>
</body>
</html>
