<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Courses - Admin Portal - CampusSphere</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">CS</div>
        <div>
          <div class="sidebar-title">CampusSphere</div>
          <div class="sidebar-subtitle">Admin Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Menu</div>
          <a href="dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
          <a href="students.html" class="nav-link"><span class="icon">👩‍🎓</span> Students</a>
          <a href="courses.html" class="nav-link active"><span class="icon">📚</span> Courses</a>
          <a href="attendance.html" class="nav-link"><span class="icon">📅</span> Attendance</a>
          <a href="fees.html" class="nav-link"><span class="icon">💳</span> Fees</a>
          <a href="results.html" class="nav-link"><span class="icon">🏆</span> Results</a>
          <a href="notifications.html" class="nav-link"><span class="icon">🔔</span> Notifications</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">A</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Admin</div>
            <div class="user-role" id="sidebar-user-role">Administrator</div>
          </div>
          <button onclick="Auth.logout()" class="btn btn-secondary btn-sm" style="margin-left:auto; padding:5px 8px;">🚪</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div>
          <h1 class="page-title">Course Management</h1>
          <p class="page-subtitle">Manage curriculum and courses</p>
        </div>
        <div class="top-bar-actions">
          <button class="btn btn-primary" onclick="openModal('courseModal')">➕ Add New Course</button>
        </div>
      </header>

      <div class="content-area">
        <div class="card">
          <div class="filter-bar">
            <select id="programFilter" class="filter-select">
              <option value="">All Programs</option>
              <option value="B.Tech CSE">B.Tech CSE</option>
              <option value="B.Tech ECE">B.Tech ECE</option>
              <option value="B.Tech ME">B.Tech ME</option>
              <option value="BCA">BCA</option>
              <option value="MCA">MCA</option>
              <option value="All">All / Global</option>
            </select>
            <select id="semesterFilter" class="filter-select">
              <option value="">All Semesters</option>
              <option value="1">Semester 1</option>
              <option value="2">Semester 2</option>
              <option value="3">Semester 3</option>
              <option value="4">Semester 4</option>
              <option value="5">Semester 5</option>
              <option value="6">Semester 6</option>
              <option value="7">Semester 7</option>
              <option value="8">Semester 8</option>
            </select>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Course Code</th>
                  <th>Course Name</th>
                  <th>Program</th>
                  <th>Semester</th>
                  <th>Credits</th>
                  <th>Instructor</th>
                  <th class="text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="courses-tbody">
                <tr><td colspan="7" class="text-center loading"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="courseModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Add New Course</h3>
        <button class="modal-close" onclick="closeModal('courseModal')">✕</button>
      </div>
      <form id="courseForm">
        <div class="modal-body">
          <input type="hidden" id="courseId">
          <div class="grid-2">
            <div class="form-group">
              <label>Course Code*</label>
              <input type="text" id="courseCode" class="form-control" placeholder="e.g. CS101" required>
            </div>
            <div class="form-group">
              <label>Course Name*</label>
              <input type="text" id="courseName" class="form-control" required>
            </div>
          </div>
          
          <div class="grid-2">
            <div class="form-group">
              <label>Program</label>
              <select id="program" class="form-control">
                <option value="All">All / Global</option>
                <option value="B.Tech CSE">B.Tech CSE</option>
                <option value="B.Tech ECE">B.Tech ECE</option>
                <option value="BCA">BCA</option>
                <option value="MCA">MCA</option>
              </select>
            </div>
            <div class="form-group">
              <label>Semester</label>
              <input type="number" id="semester" class="form-control" min="1" max="8" value="1">
            </div>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Credits</label>
              <input type="number" id="credits" class="form-control" min="1" max="6" value="3">
            </div>
            <div class="form-group">
              <label>Instructor Name</label>
              <input type="text" id="instructor" class="form-control">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('courseModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save Course</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin/courses.js"></script>
</body>
</html>
