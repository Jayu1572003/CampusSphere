<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fees - Admin Portal - CampusSphere</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">CS</div>
        <div>
          <div class="sidebar-title">CampusSphere</div>
          <div class="sidebar-subtitle">Admin Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Menu</div>
          <a href="dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
          <a href="students.html" class="nav-link"><span class="icon">👩‍🎓</span> Students</a>
          <a href="courses.html" class="nav-link"><span class="icon">📚</span> Courses</a>
          <a href="attendance.html" class="nav-link"><span class="icon">📅</span> Attendance</a>
          <a href="fees.html" class="nav-link active"><span class="icon">💳</span> Fees</a>
          <a href="results.html" class="nav-link"><span class="icon">🏆</span> Results</a>
          <a href="notifications.html" class="nav-link"><span class="icon">🔔</span> Notifications</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">A</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Admin</div>
            <div class="user-role" id="sidebar-user-role">Administrator</div>
          </div>
          <button onclick="Auth.logout()" class="btn btn-secondary btn-sm" style="margin-left:auto; padding:5px 8px;">🚪</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div>
          <h1 class="page-title">Fee Management</h1>
          <p class="page-subtitle">Track payments, dues and invoices</p>
        </div>
        <div class="top-bar-actions">
          <button class="btn btn-primary" onclick="openModal('feeModal')">➕ Record Fee</button>
        </div>
      </header>

      <div class="content-area">
        <div class="stats-grid mb-24" id="feeStats">
          <!-- Populated by JS -->
        </div>

        <div class="card">
          <div class="filter-bar">
            <select id="statusFilter" class="filter-select">
              <option value="">All Statuses</option>
              <option value="paid">Paid</option>
              <option value="pending">Pending</option>
              <option value="overdue">Overdue</option>
            </select>
            <div class="search-input">
              <span class="search-icon">🔍</span>
              <input type="text" id="searchInput" placeholder="Search student or TXN ID...">
            </div>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Student</th>
                  <th>Fee Details</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Due/Paid Date</th>
                  <th class="text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="fees-tbody">
                <tr><td colspan="6" class="text-center loading"><div class="spinner"></div></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="feeModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Record Fee</h3>
        <button class="modal-close" onclick="closeModal('feeModal')">✕</button>
      </div>
      <form id="feeForm">
        <div class="modal-body">
          <input type="hidden" id="feeId">
          <div class="form-group" id="studentSelectGroup">
            <label>Student*</label>
            <select id="studentId" class="form-control" required>
              <option value="">Loading students...</option>
            </select>
          </div>
          
          <div class="grid-2">
            <div class="form-group">
              <label>Fee Type*</label>
              <select id="feeType" class="form-control" required>
                <option value="Tuition Fee">Tuition Fee</option>
                <option value="Hostel Fee">Hostel Fee</option>
                <option value="Library Fee">Library Fee</option>
                <option value="Lab Fee">Lab Fee</option>
                <option value="Exam Fee">Exam Fee</option>
                <option value="Other">Other</option>
              </select>
            </div>
            <div class="form-group">
              <label>Amount (₹)*</label>
              <input type="number" id="amount" class="form-control" required>
            </div>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Status</label>
              <select id="status" class="form-control">
                <option value="pending">Pending</option>
                <option value="paid">Paid</option>
                <option value="overdue">Overdue</option>
                <option value="waived">Waived</option>
              </select>
            </div>
            <div class="form-group">
              <label>Semester</label>
              <input type="number" id="semester" class="form-control" min="1" max="8">
            </div>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Due Date</label>
              <input type="date" id="dueDate" class="form-control">
            </div>
            <div class="form-group">
              <label>Paid Date</label>
              <input type="date" id="paidDate" class="form-control">
            </div>
          </div>

          <div class="form-group">
            <label>Transaction ID / Remarks</label>
            <input type="text" id="transactionId" class="form-control" placeholder="TXN reference or notes">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('feeModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Save Record</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin/fees.js"></script>
</body>
</html>
