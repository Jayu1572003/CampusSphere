<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notifications - Admin Portal - CampusSphere</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">CS</div>
        <div>
          <div class="sidebar-title">CampusSphere</div>
          <div class="sidebar-subtitle">Admin Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Menu</div>
          <a href="dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
          <a href="students.html" class="nav-link"><span class="icon">👩‍🎓</span> Students</a>
          <a href="courses.html" class="nav-link"><span class="icon">📚</span> Courses</a>
          <a href="attendance.html" class="nav-link"><span class="icon">📅</span> Attendance</a>
          <a href="fees.html" class="nav-link"><span class="icon">💳</span> Fees</a>
          <a href="results.html" class="nav-link"><span class="icon">🏆</span> Results</a>
          <a href="notifications.html" class="nav-link active"><span class="icon">🔔</span> Notifications</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">A</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Admin</div>
            <div class="user-role" id="sidebar-user-role">Administrator</div>
          </div>
          <button onclick="Auth.logout()" class="btn btn-secondary btn-sm" style="margin-left:auto; padding:5px 8px;">🚪</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div>
          <h1 class="page-title">Announcements & Notifications</h1>
          <p class="page-subtitle">Broadcast messages to students and staff</p>
        </div>
        <div class="top-bar-actions">
          <button class="btn btn-primary" onclick="openModal('notifModal')">➕ New Announcement</button>
        </div>
      </header>

      <div class="content-area">
        <div class="grid-2">
          <div class="card" style="grid-column: 1 / -1;">
            <div id="notificationsList" style="display: flex; flex-direction: column; gap: 16px;">
              <!-- Notifications populated here -->
              <div class="loading text-center"><div class="spinner"></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="notifModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Create Announcement</h3>
        <button class="modal-close" onclick="closeModal('notifModal')">✕</button>
      </div>
      <form id="notifForm">
        <div class="modal-body">
          <input type="hidden" id="notifId">
          
          <div class="form-group">
            <label>Title*</label>
            <input type="text" id="title" class="form-control" required>
          </div>
          
          <div class="form-group">
            <label>Message Content*</label>
            <textarea id="message" class="form-control" rows="5" required></textarea>
          </div>

          <div class="grid-2">
            <div class="form-group">
              <label>Message Type</label>
              <select id="type" class="form-control">
                <option value="info">Info (Blue)</option>
                <option value="success">Success (Green)</option>
                <option value="warning">Warning (Yellow)</option>
                <option value="danger">Important (Red)</option>
              </select>
            </div>
            <div class="form-group">
              <label>Target Audience</label>
              <select id="targetRole" class="form-control">
                <option value="all">Everyone</option>
                <option value="student">Students Only</option>
                <option value="admin">Admins Only</option>
              </select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="closeModal('notifModal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveBtn">Publish</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/admin/notifications.js"></script>
</body>
</html>
