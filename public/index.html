<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - CampusSphere</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-page" id="loginPage">
    <div id="bg-orbs">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
    </div>
    <div class="login-container" id="loginCard">
      <div class="login-brand">
        <div class="brand-icon">🎓</div>
        <h1>CampusSphere</h1>
        <p>Next-generation Student Management System</p>
        <ul class="brand-features">
          <li><span>📚</span> <span>Complete academic tracking</span></li>
          <li><span>💳</span> <span>Seamless fee management</span></li>
          <li><span>📈</span> <span>Real-time attendance & results</span></li>
          <li><span>🔔</span> <span>Instant notifications</span></li>
        </ul>
      </div>
      <div class="login-form-section">
        <h2>Welcome back</h2>
        <p>Please enter your details to sign in.</p>

        <form id="loginForm">
          <div class="role-selector" id="roleSelector">
            <button type="button" class="role-btn active" data-role="student">Student</button>
            <button type="button" class="role-btn" data-role="admin">Admin</button>
          </div>

          <div class="form-group input-group">
            <input type="text" id="username" class="form-control" placeholder=" " required>
            <label class="floating-label" id="usernameLabel">Student ID or Admin Username</label>
            <span class="input-icon">👤</span>
          </div>
          
          <div class="form-group input-group">
            <input type="password" id="password" class="form-control" placeholder=" " required>
            <label class="floating-label">Password</label>
            <span class="input-icon">🔒</span>
          </div>

          <div class="form-group mb-24 d-flex justify-between align-center">
            <label class="custom-checkbox">
              <input type="checkbox" id="remember"> 
              <span style="font-size: 13px; font-weight: 400; padding-top:2px;">Remember me</span>
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">
            <span style="position:relative; z-index:2">Sign In</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (Auth.isLoggedIn()) {
        window.location.href = Auth.isAdmin() ? '/admin/dashboard.html' : '/student/dashboard.html';
      }

      const roleBtns = document.querySelectorAll('.role-btn');
      roleBtns.forEach(btn => {
        btn.addEventListener('click', function(e) {
          document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          
          // Animate role shift
          const card = document.getElementById('loginCard');
          card.style.transform = 'scale(0.98)';
          setTimeout(() => card.style.transform = '', 150);

          const isStudent = this.dataset.role === 'student';
          document.getElementById('usernameLabel').textContent = isStudent ? 'Student ID (e.g. STU2024001)' : 'Admin Username';
          document.getElementById('username').focus(); // Auto-focus to input
        });
      });

      // Interactive 3D Parallax effect on mouse move
      const loginPage = document.getElementById('loginPage');
      const loginCard = document.getElementById('loginCard');
      const orbs = document.querySelectorAll('.orb');

      loginPage.addEventListener('mousemove', (e) => {
        const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
        const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
        
        // Tilt card slightly
        loginCard.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        
        // Move orbs opposite to mouse
        orbs[0].style.transform = `translate(${xAxis * 2}px, ${yAxis * 2}px)`;
        orbs[1].style.transform = `translate(${-xAxis * 2}px, ${-yAxis * 2}px)`;
      });
      
      // Reset transform when mouse leaves
      loginPage.addEventListener('mouseleave', () => {
        loginCard.style.transform = `rotateY(0deg) rotateX(0deg)`;
        orbs[0].style.transform = 'translate(0px, 0px)';
        orbs[1].style.transform = 'translate(0px, 0px)';
      });

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const roleBtn = document.querySelector('.role-btn.active');
        const role = roleBtn ? roleBtn.dataset.role : 'student';

        try {
          btn.disabled = true;
          // Preserve styling when showing loading text
          btn.innerHTML = '<span style="position:relative; z-index:2">Signing in...</span>';

          const res = await API.post('/auth/login', { username, password });
          
          if (res.user.role !== role) {
            throw new Error(`Account exists but is not a ${role} account.`);
          }

          Auth.setSession(res.token, res.user);
          showToast('Login successful!', 'success');
          
          setTimeout(() => {
            window.location.href = Auth.isAdmin() ? '/admin/dashboard.html' : '/student/dashboard.html';
          }, 500);
        } catch (err) {
          showToast(err.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<span style="position:relative; z-index:2">Sign In</span>';
        }
      });
    });
  </script>
</body>
</html>
