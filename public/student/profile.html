<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - CampusSphere</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo" style="background: linear-gradient(135deg, #4ECDC4, #6C63FF);">S</div>
        <div>
          <div class="sidebar-title">CampusSphere</div>
          <div class="sidebar-subtitle">Student Portal</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">My Academics</div>
          <a href="dashboard.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
          <a href="profile.html" class="nav-link active"><span class="icon">👤</span> My Profile</a>
          <a href="attendance.html" class="nav-link"><span class="icon">📅</span> Attendance Report</a>
          <a href="fees.html" class="nav-link"><span class="icon">💳</span> Fee Dashboard</a>
          <a href="results.html" class="nav-link"><span class="icon">🏆</span> Exam Results</a>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar" style="background: linear-gradient(135deg, #4ECDC4, #6C63FF);">S</div>
          <div>
            <div class="user-name truncate" style="max-width:120px;" id="sidebar-user-name">Student</div>
            <div class="user-role" id="sidebar-user-role">Student Section</div>
          </div>
          <button onclick="Auth.logout()" class="btn btn-secondary btn-sm" style="margin-left:auto; padding:5px 8px;">🚪</button>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <header class="top-bar">
        <div>
          <h1 class="page-title">My Profile</h1>
          <p class="page-subtitle">View and update your personal information</p>
        </div>
      </header>

      <div class="content-area">
        <div class="card mb-24">
          <div class="profile-header">
            <div class="profile-avatar-lg" id="profile-avatar">S</div>
            <div class="profile-info">
              <h2 id="fullName">-</h2>
              <div class="student-id" id="studentNumber">-</div>
              <div class="profile-tags">
                <span class="badge badge-primary" id="programBadge">Program</span>
                <span class="badge badge-info" id="semesterBadge">Semester</span>
                <span class="badge badge-success" id="statusBadge">Status</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <form id="profileForm">
            <div class="grid-2">
              <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" class="form-control" required>
              </div>
              <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" class="form-control" required>
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label>Personal Email</label>
                <input type="email" id="email" class="form-control" required>
              </div>
              <div class="form-group">
                <label>Mobile Number</label>
                <input type="tel" id="phone" class="form-control">
              </div>
            </div>

            <div class="grid-2">
              <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" id="dob" class="form-control">
              </div>
              <div class="form-group">
                <label>Gender</label>
                <select id="gender" class="form-control">
                  <option value="">Select</option>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label>Residential Address</label>
              <textarea id="address" class="form-control" rows="3"></textarea>
            </div>

            <div class="text-right mt-24">
              <button type="submit" class="btn btn-primary" id="saveBtn">Save Changes</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/student/profile.js"></script>
</body>
</html>
